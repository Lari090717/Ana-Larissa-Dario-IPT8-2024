trigger:
- main

pr:
- main

pool:
  vmImage: 'windows-latest'

steps:
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.0'

- task: DotNetCoreCLI@2
  inputs:
    command: 'restore'
    projects: 'Bookonomie/Bookonomie.sln'
    feedsToUse: 'select'

- task: DotNetCoreCLI@2
  displayName: Build
  inputs:
    command: 'build'
    projects: 'Bookonomie/Bookonomie.sln'
