trigger:
- main

pool:
  vmImage: 'windows-latest'
  demands:
  - visualstudio
  - msbuild

steps:
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '10.0.200'

- task: DotNetCoreCLI@2
  inputs:
    commands: 'restore'
    projects: 'Bookonomie/Bookonomie.sln'
    feedsToUse: 'select'

- task: DotNetCoreCLI@2
  displayName: Build
  inputs:
    commands: 'build'
    projects: 'Bookonomie/Bookonomie.sln'
